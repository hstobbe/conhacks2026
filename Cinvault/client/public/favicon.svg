<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#060912"/>

  <!-- Amber film strip body -->
  <rect x="3" y="11" width="26" height="10" rx="2" fill="#F59E0B"/>

  <!-- Left perforations -->
  <rect x="4.5" y="12.5" width="3" height="3" rx="0.75" fill="#060912"/>
  <rect x="4.5" y="16.5" width="3" height="3" rx="0.75" fill="#060912"/>

  <!-- Right perforations -->
  <rect x="24.5" y="12.5" width="3" height="3" rx="0.75" fill="#060912"/>
  <rect x="24.5" y="16.5" width="3" height="3" rx="0.75" fill="#060912"/>

  <!-- Centre frame window -->
  <rect x="9" y="12.5" width="14" height="7" rx="1" fill="#060912" opacity="0.5"/>

  <!-- Amber lens dot -->
  <circle cx="16" cy="16" r="2.2" fill="#FCD34D"/>
</svg>
